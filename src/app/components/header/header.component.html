<header class="header" [class.scrolled]="isScrolled">
  <nav class="nav">
    <div class="nav-brand">
      <h2>Gabriel Serignolli</h2>
    </div>
    <ul class="nav-links">
      <li><button (click)="scrollToSection('home')">{{ translate('nav.home') }}</button></li>
      <li><button (click)="scrollToSection('about')">{{ translate('nav.about') }}</button></li>
      <li><button (click)="scrollToSection('projects')">{{ translate('nav.projects') }}</button></li>
      <li><button (click)="scrollToSection('skills')">{{ translate('nav.skills') }}</button></li>
      <li><button (click)="scrollToSection('contact')">{{ translate('nav.contact') }}</button></li>
    </ul>

    <div class="header-controls">
      <button class="language-toggle" (click)="toggleLanguage()" [attr.aria-label]="'Switch to ' + (currentLanguage === 'en' ? 'Portuguese' : 'English')">
        <span class="language-text">{{ currentLanguage === 'en' ? 'PT' : 'EN' }}</span>
      </button>

      <button class="theme-toggle" (click)="toggleTheme()" [attr.aria-label]="translate(isDarkMode ? 'theme.light' : 'theme.dark')">
        <span class="theme-icon">{{ isDarkMode ? '☀️' : '🌙' }}</span>
      </button>
    </div>
  </nav>
</header>
